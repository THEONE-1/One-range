version: '3.8'

services:
  # MySQL数据库
  mysql:
    image: docker.1ms.run/library/mysql:8.0
    container_name: one-range-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: one_range
      TZ: Asia/Shanghai
    ports:
      - "3307:3306"  # 
    volumes:
      - mysql-data:/var/lib/mysql
      - ./one_range.sql:/docker-entrypoint-initdb.d/init.sql
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    networks:
      - one-range-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Spring Boot后端
  backend:
    build:
      context: .
      target: backend
    image: one-range-backend:latest
    container_name: one-range-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/one_range?serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      TZ: Asia/Shanghai
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - one-range-network

  # Vue前端（Nginx）
  frontend:
    build:
      context: .
      target: frontend
    image: one-range-frontend:latest
    container_name: one-range-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - one-range-network

volumes:
  mysql-data:

networks:
  one-range-network:
    driver: bridge

